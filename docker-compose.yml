version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: outreach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: outreach
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - outreach-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d outreach"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: outreach-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - outreach-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── FastAPI App ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: outreach-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/outreach"
      DATABASE_URL_SYNC: "postgresql+psycopg2://postgres:postgres@postgres:5432/outreach"
      REDIS_URL: "redis://redis:6379/0"
      DB_HOST: "postgres"
      DB_PORT: "5432"
    networks:
      - outreach-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  outreach-network:
    driver: bridge

volumes:
  pgdata:
  redisdata: